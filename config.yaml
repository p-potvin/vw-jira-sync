jira:
  base_url: https://vaultwares.atlassian.net
  email: lefondhumain@pm.me
  # Legacy single-project key (VW). Kept for reference; new sync uses
  # per-repo project keys from repo_project_keys below.
  project_key: VW
  # Issue type names used for new per-repo projects (team-managed).
  task_issuetype_name: "Task"
  commits_issuetype_name: "Task"

github:
  owner: p-potvin

# Map CURRENT GitHub repo name -> the name used in backfill labels.
# Use when a tracked repo has been renamed after backfill so live_sync.py
# can still find existing Tasks via JQL label search.
repo_aliases:
  vaultwares-themes: vault-themes
  vaultwares-adk: vaultwares-agentciation

# Throttle between Jira write operations (seconds). Atlassian Cloud doesn't
# publish a hard RPS limit but starts adaptively throttling around 10 RPS.
write_delay: 0.15

# GH PR state -> Jira workflow status name
status_map:
  open: In Progress
  draft: To Do
  merged: Done
  closed: Done

# One Jira project per GitHub repo. Keys must be uppercase, 2-10 chars.
repo_project_keys:
  agentic-markup: AGMK
  vaultwares-realtime: VLRT
  vaultwares-studio: VSTUD
