  task_issuetype_id: "10007"

github:
  owner: p-potvin

# Map CURRENT GitHub repo name -> the name used in backfill labels.
# Use when a tracked repo has been renamed after backfill so live_sync.py
# can still find the existing Epic/Tasks via JQL label search.
repo_aliases:
  vaultwares-themes: vault-themes
  vaultwares-adk: vaultwares-agentciation

# Throttle between Jira write operations (seconds). Atlassian Cloud doesn't
# publish a hard RPS limit but starts adaptively throttling around 10 RPS.
write_delay: 0.15

# GH PR state -> Jira workflow status name
status_map:
  open: PR Created
  draft: To Do
  merged: Done
  closed: Done

